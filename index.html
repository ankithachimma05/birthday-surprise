<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey 💖</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<audio id="bgMusic" loop>
<source src="music/birthday.mp3">
</audio>

<!-- GIFT -->
<div id="giftPage" class="center">
<h2>Tap the Gift 🎁</h2>
<div id="giftBox" onclick="openGift()">🎁</div>
</div>

<!-- INTRO -->
<div id="page1" class="center hidden">
<h1 id="typing"></h1>
<button onclick="startStory()">Click Here For Our Journey 💖</button>
</div>

<!-- MEMORIES -->
<div id="slideshow" class="hidden center">
<div class="memoryCard">
<img id="memoryImage">
<h2 id="yearText"></h2>
<p id="memoryText"></p>
</div>

<button id="videoButton" onclick="showVideo()" class="hidden">
Watch Our Special Video 🎥
</button>
</div>

<!-- VIDEO -->
<div id="videoPage" class="hidden center">
<h2>This video is for you 💕</h2>

<div class="videoContainer">
<video id="birthdayVideo" controls>
<source src="videos/birthday.mp4" type="video/mp4">
</video>
</div>

<button onclick="showCake()">Next Surprise 🎂</button>
</div>

<!-- CAKE -->
<div id="cakePage" class="hidden center">
<h2>Make a wish and cut the cake 🎂</h2>

<div class="cakeArea">
<div id="cakeEmoji">🎂</div>
<div id="knifeEmoji">🔪</div>
</div>

<p>Drag the knife to cut the cake</p>
</div>

<!-- FINAL -->
<div id="finalPage" class="hidden center">
<h1 class="glow">🎉 HAPPY BIRTHDAY 🎉</h1>
<h2> Girllll ❤️</h2>

<p class="finalText">
No matter how much we fight  
I still choose you
And I  wish… we stay forever 🤞💞
</p>
</div>

<script src="script.js"></script>
</body>
</html>
